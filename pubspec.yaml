name: flutter_login
description: A login widget with login/signup functionalities to help speed up development
version: 5.0.0
repository: https://github.com/NearHuscarl/flutter_login

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  another_flushbar: ^1.12.30
  another_transformer_page_view: ^2.0.1
  flutter:
    sdk: flutter
  font_awesome_flutter: ^10.8.0
  intl_phone_number_input: ^0.7.4
  phone_numbers_parser: ^9.0.3
  provider: ^6.1.5
  quiver: ^3.2.2
  sign_in_button: ^3.2.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  lint: ^2.8.0
  mockito: ^5.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/ecorp.png
